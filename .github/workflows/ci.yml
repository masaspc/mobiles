name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate data (Zod schema)
        run: npm run validate
      - name: Unit tests (vitest)
        run: npm test
      - name: Type check & build (astro check + build)
        run: npm run build
      - name: Verify generated internal links
        run: npm run check:links
